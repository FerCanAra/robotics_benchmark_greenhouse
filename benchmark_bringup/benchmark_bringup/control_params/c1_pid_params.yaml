# ---------------------------------------------------------------------------
#                        PID Controller parameters
# ---------------------------------------------------------------------------

PID:
  KP: 70 # Proportional gain
  KI: 40 # Integral gain
  KD: 0 # Derivative gain
  N: 0 # Filter coefficient for derivative term
  enable_antiwindup: true # Enable anti-windup

Feedforward:
  enable_feedforward: false # Enable feedforward
  K_ff: 0.0 # Feedforward gain
  tau_ff: 0.0 # Feedforward time constant

ReferenceFilter:
  enable_referencefilter: true # Enable reference filter
  tau_f: 0.0 # Time constant for reference filter
  n_f: 1 # Filter order

MotorSim:
  max_torque: 500 # Maximum torque (Nm)
