# ---------------------------------------------------------------------------
#                     MPC - TEB Controller parameters
# ---------------------------------------------------------------------------

controller_server:
  ros__parameters:
    FollowPath:
      plugin: "teb_local_planner::TebLocalPlannerROS"
      odom_topic: /odom # Topic from which odometry is received.
      map_frame: /odom # Frame in which the local plan is received and transformed.
      teb_autosize: 1.0 # Factor to automatically size the TEB structure according to the current situation.
      transform_tolerance: 0.5 # Max. tolerable delay for transforms.
      dt_ref: 0.25 # Sample Time (seconds) between two consecutive trajectory points.
      dt_hysteresis: 0.05 # Hysteresis for the sample time.
      max_samples: 500 # Maximum number of trajectory points.
      global_plan_overwrite_orientation: True # Orientation of the global plan waypoints is ignored and recomputed from the path segments.
      allow_init_with_backwards_motion: False # Always try to move forward when initiating the trajectory.
      max_global_plan_lookahead_dist: 2.5 # Maximum length (in meters) of the section of the overall plan that TEB considers from the current position.
      global_plan_viapoint_sep: 0.5 # Separation between viapoints extracted from the global plan.
      global_plan_prune_distance: 1.5 # Distancia desde la posición actual para podar el plan global.
      exact_arc_length: True # Calcular la longitud del arco con precisión (más costoso computacionalmente).
      feasibility_check_no_poses: 3 # Number of poses in the trajectory to verify feasibility.
      publish_feedback: False # If True, feedback information is published during execution.
      # Robot restrictions for MPC
      max_vel_x: 0.5
      max_vel_x_backwards: 0.35
      max_vel_theta: 1.5
      acc_lim_x: 2.5
      acc_lim_theta: 3.2
      footprint_model:
        type: "circular"
        radius: 0.5
      # Obstacle parameters
      free_goal_vel: True
      min_obstacle_dist: 0.35 # Minimum distance to obstacles.
      inflation_dist: 0.5 # Distance for obstacle inflation.
      include_costmap_obstacles: True # If True, TEB includes costmap obstacles in the optimization.
      costmap_obstacles_behind_robot_dist: 1.5 # Distance behind the robot to consider costmap obstacles.
      obstacle_poses_affected: 25 # Number of nearby obstacles considered in the optimization.
      include_dynamic_obstacles: True # If True, TEB includes dynamic (moving) obstacles in the optimization.
      dynamic_obstacle_inflation_dist: 0.5 # Inflation zone for dynamic obstacles.
      costmap_converter_plugin: "costmap_converter::CostmapToPolygonsDBSMCCH" # The DBSMCC plugin (Distance Based Simple Merging Convex Convex Hull) converts groups of cells into convex polygons.
      costmap_converter_spin_thread: True
      costmap_converter_rate: 5
      # Optimization parameters
      no_inner_iterations: 5 # Number of inner iterations per optimization cycle.
      no_outer_iterations: 4 # NNumber of optimization cycles.
      optimization_activate: True # Activates optimization.
      optimization_verbose: False # If True, detailed optimization information is printed.
      penalty_epsilon: 0.05 # Parameter to smooth non-differentiable cost functions.
      obstacle_cost_exponent: 4.0 # Exponent for obstacle cost.
      weight_max_vel_x: 0.5 # Weights to penalize violations of linear/angular velocity/acceleration limits.
      weight_max_vel_theta: 1.0
      weight_acc_lim_x: 0.3
      weight_acc_lim_theta: 5.0
      weight_kinematics_nh: 1000.0 # Weight to penalize violations of non-holonomic kinematics.
      weight_kinematics_forward_drive: 10.0 # Weight to penalize backward movements.
      weight_kinematics_turning_radius: 0.5 # Weight to penalize small turning radii.
      weight_optimaltime: 2.0 # Weight to minimize the total time of the trajectory.
      weight_shortest_path: 0.5 # Weight to minimize the length of the trajectory.
      weight_obstacle: 50.0 # Weight for obstacle cost.
      weight_inflation: 0.1 # Weight for inflation cost.
      weight_viapoint: 100.0 # Weight to follow the waypoints of the global plan.
      weight_adapt_factor: 2.0 # Adaptation factor to adjust weights during optimization.
      # Homotopy Class Planner
      enable_homotopy_class_planning: True # Activates the Homotopy Class Planner, which seeks multiple topologically different trajectories (e.g., going around an obstacle on the left or right).
      enable_multithreading: True # Enables multithreading for the homotopy class planner to speed up computation.
      max_number_classes: 3 # Maximum number of homotopy classes (different trajectory options) to consider.
      selection_cost_hysteresis: 3.0 # Hysteresis: prevents switching trajectories due to small differences.
      selection_prefer_initial_plan: 0.8 # prefer_initial_plan: prioritizes the first plan if costs are similar.
      selection_obst_cost_scale: 2.0 # scales the cost of obstacles in trajectory selection.
      selection_alternative_time_cost: True # includes time cost when evaluating alternative trajectories.
      roadmap_graph_no_samples: 20 # Number of samples to create the roadmap graph for homotopy class planning.
      roadmap_graph_area_width: 6.0 # Width of the area to sample for the roadmap graph.
      roadmap_graph_area_length_scale: 1.0 # Length scale of the area to sample for the roadmap graph.
      h_signature_prescaler: 0.6 # Controls the topological signature (Homotopy Signature). The lower the threshold, the stricter the distinction between classes.
      h_signature_threshold: 0.15 # Threshold for the Homotopy Signature.
      obstacle_heading_threshold: 0.5 # Threshold to consider obstacle headings.
      viapoints_all_candidates: True # Uses all candidate viapoints from the global plan for homotopy class planning.
      delete_detours_backwards: True # Deletes detours that move away from the goal.
      visualize_hc_graph: False # If True, the homotopy class graph is visualized in RViz.
