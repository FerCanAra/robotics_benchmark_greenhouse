bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 30.0 # para MPPI, es 20.0. 10 hz para TEB
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001 # para MPPI, es 0.5. 0.001 hz para TEB
    min_theta_velocity_threshold: 0.001
    use_pose_prediction: False
    failure_tolerance: 1.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 30.0
    # Goal checker parameters
    #precise_goal_checker:
    #  plugin: "nav2_controller::SimpleGoalChecker"
    #  xy_goal_tolerance: 0.25
    #  yaw_goal_tolerance: 0.25
    #  stateful: True

    # TOLERANCIAS PARA LLEGAR AL PUNTO Y CUMPLIR
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.3 # SE CUMPLE CUANDO LLEGA A 0.3 METROS DEL OBJETIVO
      yaw_goal_tolerance:
        0.4 # SE CUMPLE CUANDO LLEGA A 0.4 RADIANES (22.9 GRADOS) DEL OBJETIVO
        # SI QUIERE IGNORARLO, PONER 6.28 RADIANES (360 GRADOS)
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: True

    # TEB Controller

    FollowPath:
      plugin: "teb_local_planner::TebLocalPlannerROS"
      odom_topic: /odom
      map_frame: /odom
      teb_autosize: 1.0
      transform_tolerance: 1.0
      dt_ref: 0.3
      dt_hysteresis: 0.1
      max_samples: 500
      global_plan_overwrite_orientation: True # Si es True, el plan global sobrescribe la orientación de los puntos del plan local.
      #---------------- IMPORTANTE ----------------
      allow_init_with_backwards_motion: True # Permite que el robot inicie el movimiento hacia atrás si es necesario.
      #--------------------------------------------
      max_global_plan_lookahead_dist: 1.0 # Longitud máxima (en metros) del tramo del plan global que TEB considera desde la posición actual.
      global_plan_viapoint_sep: 0.3 # Separación mínima entre viapoints extraídos del plan global.
      global_plan_prune_distance: 1.0 # Distancia desde la posición actual para podar el plan global.
      exact_arc_length: True # Calcular la longitud del arco con precisión (más costoso computacionalmente).
      feasibility_check_no_poses: 2
      publish_feedback: False

      # Robot
      max_vel_x: 0.5
      max_vel_x_backwards: 0.5
      max_vel_theta: 1.0
      acc_lim_x: 2.5
      acc_lim_theta: 3.2

      footprint_model:
        type: "circular"
        radius: 0.45

      free_goal_vel: False # Si es True, TEB no obliga a detenerse en el objetivo. Si es False, el último punto de la trayectoria se fija con velocidad 0.
      min_obstacle_dist: 0.2 # Distancia mínima a los obstáculos.
      inflation_dist: 0.3 # Zona alrededor de los obstáculos donde el coste de colisión crece exponencialmente (como en costmap inflation).
      include_costmap_obstacles: True # Si es True, TEB incluye los obstáculos del costmap en la optimización.
      costmap_obstacles_behind_robot_dist: 2.0 # Distancia detrás del robot para considerar obstáculos del costmap.
      obstacle_poses_affected: 20 # Número de obstáculos cercanos considerados en la optimización.
      include_dynamic_obstacles: True # Si es True, TEB incluye obstáculos dinámicos (en movimiento) en la optimización.
      dynamic_obstacle_inflation_dist: 0.6 # Zona de inflación para obstáculos dinámicos.
      costmap_converter_plugin: "costmap_converter::CostmapToPolygonsDBSMCCH" # El plugin DBSMCC (Distance Based Simple Merging Convex Convex Hull) convierte grupos de celdas en polígonos convexos.
      costmap_converter_spin_thread: True
      costmap_converter_rate: 5

      # Optimization
      no_inner_iterations: 5 # Número de iteraciones internas por ciclo de optimización.
      no_outer_iterations: 4 # Número de ciclos de optimización.
      optimization_activate: True # Activa la optimización.
      optimization_verbose: False # Si es True, se imprime información detallada de la optimización.
      penalty_epsilon: 0.1 # Parámetro para suavizar las funciones de coste no diferenciables.
      obstacle_cost_exponent: 6.0 # Exponente para el coste de los obstáculos.
      weight_max_vel_x: 0.5 # Pesos para penalizar violaciones de límites de velocidad/aceleración lineal y angular.
      weight_max_vel_theta: 1.0
      weight_acc_lim_x: 0.5
      weight_acc_lim_theta: 10.5
      weight_kinematics_nh: 1000.0 # Peso para penalizar violaciones de la cinemática de no holonomía.
      weight_kinematics_forward_drive: 5.0 # Peso para penalizar movimientos hacia atrás.
      weight_kinematics_turning_radius: 1.0 # Peso para penalizar radios de giro pequeños.
      weight_optimaltime: 1.0 # Peso para minimizar el tiempo total de la trayectoria.
      weight_shortest_path: 0.0 # Peso para minimizar la longitud de la trayectoria.
      weight_obstacle: 100.0 # Peso para el coste de los obstáculos.
      weight_inflation: 0.2 # Peso para el coste de inflación.
      weight_viapoint: 50.0 # Peso para seguir los viapoints del plan global.
      weight_adapt_factor: 2.0 # Factor de adaptación para ajustar los pesos durante la optimización.

      # Homotopy Class Planner
      enable_homotopy_class_planning: True # Activa el Homotopy Class Planner, que busca múltiples trayectorias topológicamente diferentes (por ejemplo, rodear un obstáculo por izquierda o derecha).
      enable_multithreading: True
      max_number_classes: 4
      selection_cost_hysteresis: 5.0 # Histeresis: evita que cambie de trayectoria por pequeñas diferencias.
      selection_prefer_initial_plan: 1.0 # prefer_initial_plan: prioriza la primera si los costes son similares.
      selection_obst_cost_scale: 1.0 # escala el coste de los obstáculos en la selección de la trayectoria.
      selection_alternative_time_cost: True
      roadmap_graph_no_samples: 15
      roadmap_graph_area_width: 5.0
      roadmap_graph_area_length_scale: 1.0
      h_signature_prescaler: 0.5 # Controlan la firma topológica (Homotopy Signature). Cuanto menor el threshold, más estricta la distinción entre clases.
      h_signature_threshold: 0.1
      obstacle_heading_threshold: 0.45
      viapoints_all_candidates: True
      delete_detours_backwards: True
      visualize_hc_graph: False

    # MPPI Controller parameters
    # FollowPath:
    #   plugin: "nav2_mppi_controller::MPPIController"
    #   primary_controller: "dwb_core::DWBLocalPlanner"
    #   angular_dist_threshold: 0.785
    #   forward_sampling_distance: 0.25
    #   rotate_to_heading_angular_vel: 1.8
    #   max_angular_accel: 3.2
    #   simulate_ahead_time: 1.0
    #   rotate_to_goal_heading: false
    #   use_path_orientations: false
    #   time_steps: 56
    #   model_dt: 0.05
    #   batch_size: 2000
    #   vx_std: 0.2
    #   vy_std: 0.2
    #   wz_std: 0.4
    #   vx_max: 0.5
    #   vx_min: -0.35
    #   vy_max: 0.5
    #   wz_max: 1.9
    #   ax_max: 3.0
    #   ax_min: -3.0
    #   ay_min: -3.0
    #   ay_max: 3.0
    #   az_max: 3.5
    #   iteration_count: 1
    #   prune_distance: 1.7
    #   transform_tolerance: 0.1
    #   temperature: 0.3
    #   gamma: 0.015
    #   motion_model: "DiffDrive"
    #   visualize: false
    #   reset_period: 1.0 # (only in Humble)
    #   regenerate_noises: false
    #   TrajectoryVisualizer:
    #     trajectory_step: 5
    #     time_step: 3
    #   TrajectoryValidator:
    #     plugin: "mppi::DefaultOptimalTrajectoryValidator"
    #     collision_lookahead_time: 2.0
    #     consider_footprint: false
    #   AckermannConstraints:
    #     min_turning_r: 0.2
    #   critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
    #   ConstraintCritic:
    #     enabled: true
    #     cost_power: 1
    #     cost_weight: 4.0
    #   GoalCritic:
    #     enabled: true
    #     cost_power: 1
    #     cost_weight: 5.0
    #     threshold_to_consider: 1.4
    #   GoalAngleCritic:
    #     enabled: true
    #     cost_power: 1
    #     cost_weight: 3.0
