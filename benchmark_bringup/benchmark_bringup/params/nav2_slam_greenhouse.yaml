# ======================
# SLAM Toolbox
# ======================
slam_toolbox:
  ros__parameters:
    use_sim_time: False
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: /laser1   # ← topic filtrado
    mode: mapping
    resolution: 0.05
    min_laser_range: 1.5
    max_laser_range: 3.5
    minimum_time_interval: 0.25
    transform_publish_period: 0.02

    # Parámetros de optimización
    optimizer_epsilon: 1e-7
    optimizer_iterations: 75
    
    # Parámetros de actualización del mapa
    map_update_interval: 2.0
    map_start_size: 25

    # Scan matching
    correlation_search_space: 0.3
    correlation_search_resolution: 0.01

    # Entorno
    map_type: karto

# ======================
# Controller Server
# ======================
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.5
      max_linear_vel: 0.8
      min_linear_vel: 0.05
      lookahead_dist: 0.6
      max_lookahead_dist: 0.9
      min_lookahead_dist: 0.3
      rotate_to_heading_angular_vel: 1.8
      max_angular_vel: 1.5

# ======================
# Planner Server
# ======================
planner_server:
  ros__parameters:
    use_sim_time: False
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: False

# ======================
# Behavior Server
# ======================
behavior_server:
  ros__parameters:
    use_sim_time: False
    behavior_plugins: ["spin", "backup", "wait"]

    spin:
      plugin: "nav2_behaviors/Spin"
      spin_xy_tolerance: 0.25
      transform_tolerance: 0.1
      max_rotational_vel: 1.0
      min_rotational_vel: 0.25
      rotational_acc_lim: 3.0

    backup:
      plugin: "nav2_behaviors/BackUp"
      backup_xy_tolerance: 0.25
      transform_tolerance: 0.1
      backup_dist: -0.15
      backup_speed: 0.025
      backup_time_allowance: 10.0
      max_linear_vel: 0.5
      min_linear_vel: 0.1
      linear_acc_lim: 0.25

    wait:
      plugin: "nav2_behaviors/Wait"
      wait_time: 5.0

# ======================
# BT Navigator
# ======================
bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_nav_to_pose_bt_xml: nav2_bt_navigator/navigate_through_poses_w_replanning_and_recovery.xml
    default_nav_through_poses_bt_xml: nav2_bt_navigator/navigate_to_pose_w_replanning_and_recovery.xml

    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node

# ======================
# Waypoint Follower
# ======================
waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: false

# ======================
# Velocity Smoother
# ======================
velocity_smoother:
  ros__parameters:
    use_sim_time: False
    speed_lim_v: 0.8
    speed_lim_w: 1.5
    accel_lim_v: 0.5
    accel_lim_w: 1.0
    decel_lim_v: 0.5
    decel_lim_w: 1.0

# ======================
# Lifecycle Manager
# ======================
lifecycle_manager:
  ros__parameters:
    use_sim_time: False
    autostart: true
    node_names:
      - map_server
      - amcl
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
