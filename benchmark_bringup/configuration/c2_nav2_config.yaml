  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 30.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    use_pose_prediction: False
    failure_tolerance: 1.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 30.0

    # Goal checker parameters
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.3
      yaw_goal_tolerance: 6.28 # Ignore the directions when reaching the goal.

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 0.5
      stateful: True

    # MPC - TEB Controller parameters
    FollowPath:
      plugin: "teb_local_planner::TebLocalPlannerROS"
      odom_topic: /odom # Topic from which odometry is received.
      map_frame: /odom # Frame in which the local plan is received and transformed.
      teb_autosize: 1.0 # Factor to automatically size the TEB structure according to the current situation.
      transform_tolerance: 1.0 # Max. tolerable delay for transforms.
      dt_ref: 0.3 # Sample Time (seconds) between two consecutive trajectory points.
      dt_hysteresis: 0.2 # Hysteresis for the sample time.
      max_samples: 500 # Maximum number of trajectory points.
      global_plan_overwrite_orientation: False # Orientation of the global plan waypoints is ignored and recomputed from the path segments.
      allow_init_with_backwards_motion: False # Always try to move forward when initiating the trajectory.
      max_global_plan_lookahead_dist: 1.5 # Maximum length (in meters) of the section of the overall plan that TEB considers from the current position.
      global_plan_viapoint_sep: 0.3 # Separation between viapoints extracted from the global plan.
      global_plan_prune_distance: 1.0 # Distancia desde la posición actual para podar el plan global.
      exact_arc_length: True # Calcular la longitud del arco con precisión (más costoso computacionalmente).
      feasibility_check_no_poses: 2 # Number of poses in the trajectory to verify feasibility.
      publish_feedback: False # If True, feedback information is published during execution.
      # Robot restrictions for MPC
      max_vel_x: 0.5
      max_vel_x_backwards: 0.5
      max_vel_theta: 3.0
      acc_lim_x: 2.5
      acc_lim_theta: 3.2
      footprint_model:
        type: "circular"
        radius: 0.45
      # Obstacle parameters
      free_goal_vel: True
      min_obstacle_dist: 0.3 # Minimum distance to obstacles.
      inflation_dist: 0.4 # Distance for obstacle inflation.
      include_costmap_obstacles: True # If True, TEB includes costmap obstacles in the optimization.
      costmap_obstacles_behind_robot_dist: 2.0 # Distance behind the robot to consider costmap obstacles.
      obstacle_poses_affected: 20 # Number of nearby obstacles considered in the optimization.
      include_dynamic_obstacles: True # If True, TEB includes dynamic (moving) obstacles in the optimization.
      dynamic_obstacle_inflation_dist: 0.6 # Inflation zone for dynamic obstacles.
      costmap_converter_plugin: "costmap_converter::CostmapToPolygonsDBSMCCH" # The DBSMCC plugin (Distance Based Simple Merging Convex Convex Hull) converts groups of cells into convex polygons.
      costmap_converter_spin_thread: True
      costmap_converter_rate: 5
      # Optimization parameters
      no_inner_iterations: 5 # Number of inner iterations per optimization cycle.
      no_outer_iterations: 4 # NNumber of optimization cycles.
      optimization_activate: True # Activates optimization.
      optimization_verbose: False # If True, detailed optimization information is printed.
      penalty_epsilon: 0.1 # Parameter to smooth non-differentiable cost functions.
      obstacle_cost_exponent: 6.0 # Exponent for obstacle cost.
      weight_max_vel_x: 0.5 # Weights to penalize violations of linear/angular velocity/acceleration limits.
      weight_max_vel_theta: 1.0
      weight_acc_lim_x: 0.5
      weight_acc_lim_theta: 10.5
      weight_kinematics_nh: 1000.0 # Weight to penalize violations of non-holonomic kinematics.
      weight_kinematics_forward_drive: 50.0 # Weight to penalize backward movements.
      weight_kinematics_turning_radius: 1.0 # Weight to penalize small turning radii.
      weight_optimaltime: 1.0 # Weight to minimize the total time of the trajectory.
      weight_shortest_path: 0.0 # Weight to minimize the length of the trajectory.
      weight_obstacle: 100.0 # Weight for obstacle cost.
      weight_inflation: 0.2 # Weight for inflation cost.
      weight_viapoint: 50.0 # Weight to follow the waypoints of the global plan.
      weight_adapt_factor: 2.0 # Adaptation factor to adjust weights during optimization.
      # Homotopy Class Planner
      enable_homotopy_class_planning: True # Activates the Homotopy Class Planner, which seeks multiple topologically different trajectories (e.g., going around an obstacle on the left or right).
      enable_multithreading: True # Enables multithreading for the homotopy class planner to speed up computation.
      max_number_classes: 4 # Maximum number of homotopy classes (different trajectory options) to consider.
      selection_cost_hysteresis: 5.0 # Hysteresis: prevents switching trajectories due to small differences.
      selection_prefer_initial_plan: 1.0 # prefer_initial_plan: prioritizes the first plan if costs are similar.
      selection_obst_cost_scale: 1.0 # scales the cost of obstacles in trajectory selection.
      selection_alternative_time_cost: True # includes time cost when evaluating alternative trajectories.
      roadmap_graph_no_samples: 15 # Number of samples to create the roadmap graph for homotopy class planning.
      roadmap_graph_area_width: 5.0 # Width of the area to sample for the roadmap graph.
      roadmap_graph_area_length_scale: 1.0 # Length scale of the area to sample for the roadmap graph.
      h_signature_prescaler: 0.5 # Controls the topological signature (Homotopy Signature). The lower the threshold, the stricter the distinction between classes.
      h_signature_threshold: 0.1 # Threshold for the Homotopy Signature.
      obstacle_heading_threshold: 0.45 # Threshold to consider obstacle headings.
      viapoints_all_candidates: True # Uses all candidate viapoints from the global plan for homotopy class planning.
      delete_detours_backwards: True # Deletes detours that move away from the goal.
      visualize_hc_graph: False # If True, the homotopy class graph is visualized in RViz.

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 7.5
      publish_frequency: 3.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 100
      height: 100
      resolution: 0.05
      robot_radius: 0.4
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        inflation_radius: 0.8
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: laser1
        laser1:
          topic: /laser1
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 2.0
          raytrace_min_range: 0.5
          obstacle_max_range: 2.0
          obstacle_min_range: 0.5
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      map_topic: "/global_costmap/costmap"
      origin_x: -15.0
      origin_y: -15.0
      width: 100
      height: 100
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      robot_radius: 0.4
      resolution: 0.05
      track_unknown_space: True
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: laser1
        laser1:
          topic: /laser1
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 2.0
          raytrace_min_range: 0.5
          obstacle_max_range: 2.0
          obstacle_min_range: 0.5
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.5
        inflation_radius: 0.5
      always_send_full_costmap: True

map_server:
  ros__parameters:
    use_sim_time: False
    # Overridden in launch by the "map" launch configuration or provided default value.
    # To use in yaml, remove the default "map" value in the tb3_simulation_launch.py file & provide full path to map below.
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins:
      ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [3.0, 0.0, 3.0]
    min_velocity: [-3.0, 0.0, -3.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
